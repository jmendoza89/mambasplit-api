app:
  security:
    jwt:
      issuer: "mambasplit-api-test"
      secret: "test-secret-change-me-test-secret-change-me"
      accessTokenMinutes: 15
      refreshTokenDays: 30

spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5432/mambasplit_test}
    username: ${TEST_DB_USERNAME:mambasplit}
    password: ${TEST_DB_PASSWORD:mambasplit}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    clean-disabled: true
